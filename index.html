<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Portfolio AI</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#081120" />

  <link rel="stylesheet" href="style.css" />

  <!-- ✅ FIXED PDF LIBRARY -->
  <script src="https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
</head>

<body>

<div class="app-shell">

  <h1>Portfolio AI</h1>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" data-tab="generator">Generate</button>
    <button class="tab" data-tab="editor">Editor</button>
    <button class="tab" data-tab="preview">Preview</button>
  </div>

  <!-- GENERATE -->
  <section id="generator" class="tab-panel active">

    <label>Paste LinkedIn Profile Text</label>
    <textarea id="linkedinInput"></textarea>

    <!-- PDF Upload -->
    <label class="file-label">
      Upload LinkedIn PDF
      <input type="file" id="linkedinPdfInput" accept=".pdf" hidden>
    </label>

    <p id="pdfStatus">No PDF uploaded</p>

    <input id="personName" placeholder="Name">
    <input id="personRole" placeholder="Role">
    <input id="githubUrl" placeholder="GitHub URL">

    <label>Projects (Name | Desc | URL)</label>
    <textarea id="projectsInput"></textarea>

    <button id="generateBtn">Generate Portfolio</button>

  </section>

  <!-- EDITOR -->
  <section id="editor" class="tab-panel">
    <textarea id="htmlInput"></textarea>
    <button id="runBtn">Run Preview</button>
  </section>

  <!-- PREVIEW -->
  <section id="preview" class="tab-panel">
    <iframe id="previewFrame"></iframe>
  </section>

</div>

<script src="app.js"></script>

</body>
</html>
